<!DOCTYPE html>
<html>
<head>
<title>Hacking...</title>

<style>
body {
  background: black;
  color: #00ff00;
  font-family: monospace;
  padding: 20px;
}
</style>

</head>

<body>

<h2>⚡ Hacking System...</h2>
<pre id="hack"></pre>

<script>
let text = "";
let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

function hackEffect() {
  text += chars[Math.floor(Math.random() * chars.length)];
  document.getElementById("hack").innerText = text;

  if(text.length < 200) {
    setTimeout(hackEffect, 30);
  } else {
    window.location.href = "index.html";
  }
}

hackEffect();
</script>

</body>
</html>
