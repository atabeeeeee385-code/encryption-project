<script>

// Menu
function toggleMenu() {
  let menu = document.getElementById("sideMenu");
  menu.style.left = (menu.style.left === "0px") ? "-350px" : "0px";
}

// Encryption Logic (زي ما هو)
let map = {
  "0":"5","1":"8","2":"3","3":"9","4":"1",
  "5":"0","6":"2","7":"4","8":"6","9":"7"
};

let reverseMap = {
  "5":"0","8":"1","3":"2","9":"3","1":"4",
  "0":"5","2":"6","4":"7","6":"8","7":"9"
};

function encrypt() {
  let text = document.getElementById("text").value;
  let result = "";

  if(text === "") {
    alert("اكتب حاجة الأول");
    return;
  }

  for (let i = 0; i < text.length; i++) {
    let char = text[i];

    if (map[char]) result += map[char];
    else if (char >= 'a' && char <= 'z') {
      let code = char.charCodeAt(0) - 97;
      result += String.fromCharCode(((code + 2) % 26) + 97);
    }
    else if (char >= 'A' && char <= 'Z') {
      let code = char.charCodeAt(0) - 65;
      result += String.fromCharCode(((code + 2) % 26) + 65);
    }
    else result += char;
  }

  document.getElementById("result").innerText = result;
  saveHistory("Encrypt", text, result);
  gtag('event', 'encryption_action', { type: 'encrypt' });
}

function decrypt() {
  let text = document.getElementById("text").value;
  let result = "";

  if(text === "") {
    alert("اكتب حاجة الأول");
    return;
  }

  for (let i = 0; i < text.length; i++) {
    let char = text[i];

    if (reverseMap[char]) result += reverseMap[char];
    else if (char >= 'a' && char <= 'z') {
      let code = char.charCodeAt(0) - 97;
      result += String.fromCharCode(((code - 2 + 26) % 26) + 97);
    }
    else if (char >= 'A' && char <= 'Z') {
      let code = char.charCodeAt(0) - 65;
      result += String.fromCharCode(((code - 2 + 26) % 26) + 65);
    }
    else result += char;
  }

  document.getElementById("result").innerText = result;
  saveHistory("Decrypt", text, result);
  gtag('event', 'encryption_action', { type: 'decrypt' });
}

function copyText() {
  let text = document.getElementById("result").innerText;
  if (text === "") return alert("مفيش حاجة تتنسخ");
  navigator.clipboard.writeText(text);
  alert("تم النسخ ✅");
}

function saveHistory(type, input, output) {
  let history = JSON.parse(localStorage.getItem("history")) || [];
  history.unshift({ type, input, output });
  localStorage.setItem("history", JSON.stringify(history));
  displayHistory();
}

function displayHistory() {
  let history = JSON.parse(localStorage.getItem("history")) || [];
  let container = document.getElementById("history");
  container.innerHTML = "";
  history.slice(0,5).forEach(item => {
    let div = document.createElement("div");
    div.className = "history-item";
    div.innerText = `${item.type}: ${item.input} → ${item.output}`;
    container.appendChild(div);
  });
}

window.onload = displayHistory;

function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

</script>
