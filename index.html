<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Encryption Project</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9LDBJ1H8MQ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-9LDBJ1H8MQ');
</script>

<style>
body {
  background: black;
  color: #00ff00;
  font-family: monospace;
  text-align: center;
  padding-top: 80px;
}

input, button {
  background: black;
  color: #00ff00;
  border: 1px solid #00ff00;
  padding: 10px;
  margin: 5px;
}

#history {
  margin-top: 15px;
  max-height: 150px;
  overflow-y: auto;
  border: 1px solid #00ff00;
  padding: 10px;
  width: 300px;
  margin-left: auto;
  margin-right: auto;
}

.history-item {
  border-bottom: 1px solid #00ff00;
  padding: 5px;
  font-size: 13px;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>

<h1>🔐 Encryption & Decryption</h1>

<input type="text" id="text" placeholder="Enter text"><br><br>

<button onclick="encrypt()">Encrypt</button>
<button onclick="decrypt()">Decrypt</button>
<button onclick="copyText()">📋 Copy</button>

<p id="result"></p>

<h3>📜 History</h3>
<div id="history"></div>

<br>
<button onclick="logout()">Logout</button>

<script>

// خرائط الأرقام
let map = {
  "0":"5","1":"8","2":"3","3":"9","4":"1",
  "5":"0","6":"2","7":"4","8":"6","9":"7"
};

let reverseMap = {
  "5":"0","8":"1","3":"2","9":"3","1":"4",
  "0":"5","2":"6","4":"7","6":"8","7":"9"
};

// 🔐 Encrypt
function encrypt() {
  let text = document.getElementById("text").value;
  let result = "";

  if(text === "") {
    alert("اكتب حاجة الأول");
    return;
  }

  for (let i = 0; i < text.length; i++) {
    let char = text[i];

    if (map[char]) {
      result += map[char];
    }
    else if (char >= 'a' && char <= 'z') {
      let code = char.charCodeAt(0) - 97;
      code = (code + 2) % 26;
      result += String.fromCharCode(code + 97);
    }
    else if (char >= 'A' && char <= 'Z') {
      let code = char.charCodeAt(0) - 65;
      code = (code + 2) % 26;
      result += String.fromCharCode(code + 65);
    }
    else {
      result += char;
    }
  }

  document.getElementById("result").innerText = result;

  saveHistory("Encrypt", text, result);

  gtag('event', 'encryption_action', { type: 'encrypt' });
}

// 🔓 Decrypt
function decrypt() {
  let text = document.getElementById("text").value;
  let result = "";

  if(text === "") {
    alert("اكتب حاجة الأول");
    return;
  }

  for (let i = 0; i < text.length; i++) {
    let char = text[i];

    if (reverseMap[char]) {
      result += reverseMap[char];
    }
    else if (char >= 'a' && char <= 'z') {
      let code = char.charCodeAt(0) - 97;
      code = (code - 2 + 26) % 26;
      result += String.fromCharCode(code + 97);
    }
    else if (char >= 'A' && char <= 'Z') {
      let code = char.charCodeAt(0) - 65;
      code = (code - 2 + 26) % 26;
      result += String.fromCharCode(code + 65);
    }
    else {
      result += char;
    }
  }

  document.getElementById("result").innerText = result;

  saveHistory("Decrypt", text, result);

  gtag('event', 'encryption_action', { type: 'decrypt' });
}

// 📋 Copy
function copyText() {
  let text = document.getElementById("result").innerText;

  if (text === "") {
    alert("مفيش حاجة تتنسخ");
    return;
  }

  navigator.clipboard.writeText(text);
  alert("تم النسخ ✅");
}

// 📜 Save History
function saveHistory(type, input, output) {
  let history = JSON.parse(localStorage.getItem("history")) || [];

  history.unshift({
    type: type,
    input: input,
    output: output
  });

  localStorage.setItem("history", JSON.stringify(history));
  displayHistory();
}

// 📜 Display History
function displayHistory() {
  let history = JSON.parse(localStorage.getItem("history")) || [];
  let container = document.getElementById("history");

  container.innerHTML = "";

  history.slice(0, 5).forEach(item => {
    let div = document.createElement("div");
    div.className = "history-item";
    div.innerText = `${item.type}: ${item.input} → ${item.output}`;
    container.appendChild(div);
  });
}

window.onload = displayHistory;

// Logout
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

</script>

</body>
</html>
