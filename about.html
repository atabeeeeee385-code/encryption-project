<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  background: black;
  color: #00ff00;
  font-family: monospace;
  padding: 15px;
  direction: rtl;
  text-align: right;
}

.cursor {
  display: inline-block;
  background: #00ff00;
  width: 10px;
  margin-right: 5px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,100% {opacity: 1;}
  50% {opacity: 0;}
}
</style>
</head>

<body>

<div id="text"></div><span class="cursor"></span>

<script>

let content = `
📖 شرح المشروع

>> [جاري تشغيل النظام...]
>> [تحميل خوارزميات التشفير...]
>> [جاهز لاستقبال البيانات...]

--------------------------------

🎯 فكرة المشروع:
المشروع عبارة عن نظام بسيط للتشفير وفك التشفير باستخدام JavaScript.
يهدف إلى تحويل النصوص إلى شكل غير مفهوم ثم إرجاعها مرة أخرى.

--------------------------------

🔐 طريقة التشفير:

1) تشفير الأرقام:
يتم استبدال كل رقم برقم آخر حسب جدول ثابت.

2) تشفير الحروف:
يتم تحريك كل حرف بمقدار +2 في الأبجدية.

--------------------------------

🔓 فك التشفير:
يتم عكس العمليات السابقة لاسترجاع النص الأصلي.

--------------------------------

⚙️ مميزات المشروع:
- تشفير وفك التشفير
- نسخ النتيجة
- حفظ العمليات السابقة
- نظام تسجيل دخول
- واجهة تفاعلية

--------------------------------

🧠 التقنيات المستخدمة:
- HTML
- CSS
- JavaScript
- LocalStorage

--------------------------------

⚠️ ملاحظات:
هذا المشروع لأغراض تعليمية فقط
والتشفير المستخدم بسيط.

--------------------------------

👨‍💻 فريق العمل:
- Abdullah Badawy (Leader)
- Mohamed Alaa
- Youssef Moslem
- Marwan Mousa
- Mohamed Abu El Ghar
`;

let i = 0;
let speed = 20;

function typeWriter() {
  if (i < content.length) {
    document.getElementById("text").innerHTML += content.charAt(i);
    i++;
    setTimeout(typeWriter, speed);
  }
}

typeWriter();

</script>

</body>
</html>
