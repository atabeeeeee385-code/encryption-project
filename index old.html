<html lang="en">
<head>
<meta charset="UTF-8">

<style>
body {
  background: black;
  color: #00ff00;
  font-family: monospace;
  text-align: center;
  padding-top: 80px;
}

input, button {
  background: black;
  color: #00ff00;
  border: 1px solid #00ff00;
  padding: 10px;
  margin: 5px;
}

.dev-box {
  margin-top: 60px;
  border: 2px solid #00ff00;
  padding: 20px;
  width: 340px;
  margin-left: auto;
  margin-right: auto;
  border-radius: 15px;
  box-shadow: 0 0 25px #00ff00;
  background: rgba(0, 0, 0, 0.8);
}

.supervisor {
  margin-bottom: 25px;
  padding-bottom: 10px;
  border-bottom: 1px solid #00ff00;
}

.team {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-top: 15px;
}

.member {
  text-align: center;
}

.member img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 2px solid #00ff00;
  box-shadow: 0 0 15px #00ff00;
  transition: 0.3s;
}

.member img:hover {
  transform: scale(1.1);
}

.placeholder {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 2px solid #00ff00;
  box-shadow: 0 0 15px #00ff00;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
}

.member p {
  margin-top: 8px;
  font-size: 14px;
}
</style>

</head>

<body>

<!-- حماية الصفحة -->
<script>
if(localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>

<h1>🔐 Encryption & Decryption</h1>

<input type="text" id="text" placeholder="Enter text"><br><br>

<button onclick="encrypt()">Encrypt</button>
<button onclick="decrypt()">Decrypt</button>

<p id="result"></p>

<br>
<button onclick="logout()">Logout</button>

<div class="dev-box">

  <div class="supervisor">
    <h3>🎓 Project Supervisor</h3>
    <p>Eng. Farida Azab</p>
  </div>

  <h3>👨‍💻 Development Team</h3>

  <div class="team">

    <div class="member">
      <img src="Abdallah 1.jpg">
      <p>Abdullah Badawy (Leader)</p>
    </div>

    <div class="member">
      <img src="7oms.jpg">
      <p>Mohamed Alaa</p>
    </div>

    <div class="member">
      <img src="Yousef.jpg">
      <p>Youssef Moslem</p>
    </div>

    <div class="member">
      <img src="Maro.jpg">
      <p>Marwan Mousa</p>
    </div>

    <div class="member">
      <div class="placeholder">👤</div>
      <p>Mohamed Abu El Ghar</p>
    </div>

  </div>

</div>

<script>
function encrypt() {
  let text = document.getElementById("text").value;
  let result = "";

  for (let i = 0; i < text.length; i++) {
    result += text.charCodeAt(i) + " ";
  }

  document.getElementById("result").innerText = result;

  // تسجيل الحدث
  gtag('event', 'encryption_action', {
    type: 'encrypt'
  });
}

function decrypt() {
  let text = document.getElementById("text").value.split(" ");
  let result = "";

  for (let i = 0; i < text.length; i++) {
    if (text[i] != "") {
      result += String.fromCharCode(text[i]);
    }
  }

  document.getElementById("result").innerText = result;

  // تسجيل الحدث
  gtag('event', 'encryption_action', {
    type: 'decrypt'
  });
}

function logout() {
  localStorage.removeItem("loggedIn");

  // تسجيل خروج
  gtag('event', 'user_session', {
    action: 'logout'
  });

  window.location.href = "login.html";
}
</script>

</body>
</html>
